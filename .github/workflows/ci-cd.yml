name: Microservices Docker CI/CD


on:
  push:
    branches:
      - gitHub


jobs:

  docker-build-push:

    runs-on: ubuntu-latest


    steps:


    # Step 1: Checkout Code
    - name: Checkout Repository
      uses: actions/checkout@v4



    # Step 2: Docker Login
    - name: Login to Docker Hub
      uses: docker/login-action@v3

      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}



    # ==========================
    # AUTH SERVICE
    # ==========================

    - name: Build Auth Service Image
      run: |

        docker build \
        -t firdousalam2058/auth-service:v8 \
        ./auth-service



    - name: Push Auth Service Image
      run: |

        docker push \
        firdousalam2058/auth-service:v8




    # ==========================
    # USER SERVICE
    # ==========================

    - name: Build User Service Image
      run: |

        docker build \
        -t firdousalam2058/user-service:v8 \
        ./user-service



    - name: Push User Service Image
      run: |

        docker push \
        firdousalam2058/user-service:v8





    # ==========================
    # PRODUCT SERVICE
    # ==========================

    - name: Build Product Service Image
      run: |

        docker build \
        -t firdousalam2058/product-service:v8 \
        ./product-service



    - name: Push Product Service Image
      run: |

        docker push \
        firdousalam2058/product-service:v8