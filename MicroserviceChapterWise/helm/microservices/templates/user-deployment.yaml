apiVersion: apps/v1
kind: Deployment

metadata:
  name: user-deployment

spec:
  replicas: {{ .Values.user.replicas }}

  selector:
    matchLabels:
      app: user

  template:
    metadata:
      labels:
        app: user

    spec:
      containers:
        - name: user
          image: {{ .Values.user.image }}
          imagePullPolicy: Always

          ports:
            - containerPort: {{ .Values.user.port }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.user.port }}
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.user.port }}
            initialDelaySeconds: 20
            periodSeconds: 10

          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: microservice-secret
                  key: MONGO_URI

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: microservice-secret
                  key: JWT_SECRET

            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: microservice-config
                  key: NODE_ENV