apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-deployment

spec:
  replicas: {{ .Values.auth.replicaCount }}

  selector:
    matchLabels:
      app: auth

  template:
    metadata:
      labels:
        app: auth

    spec:
      containers:
        - name: auth
          image: {{ .Values.auth.image }}
          imagePullPolicy: Always

          ports:
            - containerPort: {{ .Values.auth.port }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.auth.port }}
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.auth.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: microservice-secret
                  key: MONGO_URI

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: microservice-secret
                  key: JWT_SECRET

            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: microservice-config
                  key: NODE_ENV