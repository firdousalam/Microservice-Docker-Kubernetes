apiVersion: apps/v1
kind: Deployment

metadata:
  name: product-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: product

  template:

    metadata:
      labels:
        app: product

    spec:

      containers:

      - name: product

        image: firdousalam2058/product-service:v1

        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: MONGO_URI

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 3002